name: CI/CD to Docker Hub

# main 브랜치에 코드가 푸시될 때 워크플로우가 실행됩니다.
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 저장소에서 코드를 체크아웃합니다.
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 멀티 아키텍처 및 캐싱 등의 기능을 활용하기 위해 Buildx 환경을 세팅합니다.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. GitHub Secrets에 저장된 자격 증명을 이용해 Docker Hub에 로그인합니다.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Docker 이미지를 빌드 및 Docker Hub로 푸시합니다.
      # 캐시를 사용해 빌드 속도를 개선하도록 설정되었습니다.
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/chord-recognizer:latest
          # 빌드 시간 단축을 위한 원격 캐시 설정
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/chord-recognizer:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/chord-recognizer:buildcache,mode=max
  deploy:
      needs: build-and-push
      runs-on: self-hosted
      
      steps:
        - name: Pull latest image
          run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/chord-recognizer:latest

        - name: Remove old container (force)
          run: docker rm -f chord-container || true

        - name: Run new container
          run: docker run -d -p 8000:8000 --name chord-container ${{ secrets.DOCKERHUB_USERNAME }}/chord-recognizer:latest